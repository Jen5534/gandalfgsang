<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perch</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-screen" class="login-screen">
    <div class="login-card sso-card">
      <div class="login-logo">
        <svg width="32" height="32" viewBox="0 0 200 200" fill="none"><rect width="200" height="200" rx="42" fill="#006A4D"/><path d="M10 155 Q100 149 190 153" stroke="white" stroke-width="13" stroke-linecap="round"/><path d="M60 100 L18 77 L30 108 L12 148 L62 126 Z" fill="white"/><circle cx="90" cy="110" r="36" fill="white"/><circle cx="132" cy="82" r="25" fill="white"/><path d="M155 81 L184 68 L184 92 Z" fill="white"/><circle cx="141" cy="77" r="8" fill="#006A4D"/><circle cx="138" cy="74" r="3" fill="white"/></svg>
        Perch
      </div>
      <p class="login-subtitle">My Desk Booker</p>
      <div class="sso-status" id="sso-status">
        <div class="sso-spinner" id="sso-spinner"></div>
        <span id="sso-message">Authenticating with SSO&hellip;</span>
      </div>
      <button class="btn btn-primary btn-full" id="sso-signin-btn" style="display:none" onclick="ssoLogin()">Sign in again</button>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="22" height="22" viewBox="0 0 200 200" fill="none"><rect width="200" height="200" rx="42" fill="rgba(255,255,255,0.15)"/><path d="M10 155 Q100 149 190 153" stroke="white" stroke-width="13" stroke-linecap="round"/><path d="M60 100 L18 77 L30 108 L12 148 L62 126 Z" fill="white"/><circle cx="90" cy="110" r="36" fill="white"/><circle cx="132" cy="82" r="25" fill="white"/><path d="M155 81 L184 68 L184 92 Z" fill="white"/><circle cx="141" cy="77" r="8" fill="rgba(0,0,0,0.25)"/><circle cx="138" cy="74" r="3" fill="white"/></svg>
        <span>Perch</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item" data-view="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#" class="nav-item" data-view="book">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="16" x2="15" y2="16"/><line x1="12" y1="13" x2="12" y2="19"/></svg>
          Book a Desk
        </a>
        <a href="#" class="nav-item" data-view="my-bookings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          My Bookings
        </a>
        <a href="#" class="nav-item" data-view="whos-in">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Who's In
        </a>
        <a href="#" class="nav-item" data-view="floorplan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Floor Plan
        </a>
        <a href="#" class="nav-item nav-item-manager" data-view="team-bookings" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="10" y1="21" x2="14" y2="21"/></svg>
          Team Bookings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-meta">
            <div class="user-name" id="sidebar-name"></div>
            <div class="user-role" id="sidebar-role"></div>
          </div>
        </div>
        <div class="sidebar-footer-btns">
          <button class="btn-signout" id="logout-btn">Sign out</button>
          <button class="btn-switch" id="switch-btn">Switch account</button>
        </div>
        <a href="admin.html" class="btn-admin" title="Admin Portal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          Admin
        </a>
      </div>
    </aside>

    <main class="main">
      <div id="view-dashboard" class="view"></div>
      <div id="view-book" class="view hidden"></div>
      <div id="view-my-bookings" class="view hidden"></div>
      <div id="view-whos-in" class="view hidden"></div>
      <div id="view-floorplan" class="view hidden"></div>
      <div id="view-team-bookings" class="view hidden"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Agent chat panel -->
  <div id="agent-panel" class="agent-panel hidden">
    <div class="agent-header">
      <div class="agent-title">
        <div class="agent-status-dot"></div>
        Perch Assistant
      </div>
      <button class="agent-close-btn" onclick="toggleAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="agent-messages" class="agent-messages"></div>
    <div id="agent-chips" class="agent-chips"></div>
    <div class="agent-input-bar">
      <input type="text" id="agent-input" class="agent-input" placeholder="Ask me anything…"
        onkeydown="if(event.key==='Enter')sendAgentMessage()">
      <button class="agent-send-btn" onclick="sendAgentMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <button class="agent-trigger" onclick="toggleAgent()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="../data/historic-data.js"></script>
  <script src="../data/users-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
