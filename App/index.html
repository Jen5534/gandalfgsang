<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perch</title>
  <link rel="icon" type="image/png" href="perchlogo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-screen" class="login-screen">
    <div class="login-card sso-card">
      <div class="login-logo">
        <img src="perchlogo.png" width="120" height="120" alt="Perch">
        Perch
      </div>
      <p class="login-subtitle">My Desk Booker</p>
      <div class="sso-status" id="sso-status">
        <div class="sso-spinner" id="sso-spinner"></div>
        <span id="sso-message">Authenticating with SSO&hellip;</span>
      </div>
      <button class="btn btn-primary btn-full" id="sso-signin-btn" style="display:none" onclick="ssoLogin()">Sign in again</button>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="perchlogo.png" width="40" height="40" alt="Perch">
        <span>Perch</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item" data-view="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#" class="nav-item" data-view="book">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="16" x2="15" y2="16"/><line x1="12" y1="13" x2="12" y2="19"/></svg>
          Book a Desk
        </a>
        <a href="#" class="nav-item" data-view="my-bookings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          My Bookings
        </a>
        <a href="#" class="nav-item" data-view="whos-in">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Who's In
        </a>
        <a href="#" class="nav-item" data-view="floorplan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Floor Plan
        </a>
        <a href="#" class="nav-item" data-view="feedback">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg>
          Feedback
        </a>
        <a href="#" class="nav-item nav-item-manager" data-view="team-bookings" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="10" y1="21" x2="14" y2="21"/></svg>
          Team Bookings
        </a>
        <a href="#" class="nav-item" data-view="declare">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>
          Declare
        </a>
        <a href="#" class="nav-item" data-view="my-allocation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M16 11l2 2 4-4"/></svg>
          My Allocation
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-meta">
            <div class="user-name" id="sidebar-name"></div>
            <div class="user-role" id="sidebar-role"></div>
          </div>
        </div>
        <div class="sidebar-footer-btns">
          <button class="btn-signout" id="logout-btn">Sign out</button>
          <button class="btn-switch" id="switch-btn">Switch account</button>
          <button class="btn-switch" onclick="showDelegatesModal()">Delegates</button>
        </div>
        <a href="admin.html" class="btn-admin" title="Admin Portal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          Admin
        </a>
      </div>
    </aside>

    <main class="main">
      <div id="view-dashboard" class="view"></div>
      <div id="view-book" class="view hidden"></div>
      <div id="view-my-bookings" class="view hidden"></div>
      <div id="view-whos-in" class="view hidden"></div>
      <div id="view-floorplan" class="view hidden"></div>
      <div id="view-team-bookings" class="view hidden"></div>
      <div id="view-feedback"      class="view hidden"></div>
      <div id="view-declare"       class="view hidden"></div>
      <div id="view-my-allocation" class="view hidden"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Agent chat panel -->
  <div id="agent-panel" class="agent-panel hidden">
    <div class="agent-header">
      <div class="agent-title">
        <div class="agent-status-dot"></div>
        Perch Assistant
      </div>
      <button class="agent-close-btn" onclick="toggleAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="agent-messages" class="agent-messages"></div>
    <div id="agent-chips" class="agent-chips"></div>
    <div class="agent-input-bar">
      <input type="text" id="agent-input" class="agent-input" placeholder="Ask me anything…"
        onkeydown="if(event.key==='Enter')sendAgentMessage()">
      <button class="agent-send-btn" onclick="sendAgentMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <button class="agent-trigger" onclick="toggleAgent()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>
  <button id="mobile-preview-trigger" class="mobile-preview-trigger" onclick="toggleMobilePreview()" title="Mobile Preview">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3" stroke-linecap="round"/></svg>
  </button>

  <!-- Mobile Preview Overlay -->
  <div id="mobile-preview-overlay" class="mobile-preview-overlay hidden" onclick="if(event.target===this)toggleMobilePreview()">
    <div class="mobile-preview-panel">
      <div class="mobile-preview-toolbar">
        <span class="mobile-preview-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3" stroke-linecap="round"/></svg>
          Mobile Preview
        </span>
        <div class="mobile-dev-tabs">
          <button class="mobile-dev-tab active" data-device="iphone14" onclick="setMobileDevice('iphone14')">iPhone 14</button>
          <button class="mobile-dev-tab" data-device="iphoneSE"  onclick="setMobileDevice('iphoneSE')">SE</button>
          <button class="mobile-dev-tab" data-device="pixel7"    onclick="setMobileDevice('pixel7')">Pixel</button>
          <button class="mobile-dev-tab" data-device="ipad"      onclick="setMobileDevice('ipad')">iPad</button>
        </div>
        <button class="mobile-rotate-btn" onclick="toggleMobileOrientation()" title="Rotate device">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <div class="mobile-page-tabs" style="margin-left:auto">
          <button class="mobile-page-tab active" data-page="index.html"  onclick="setMobilePage('index.html')">App</button>
          <button class="mobile-page-tab"         data-page="admin.html" onclick="setMobilePage('admin.html')">Admin</button>
        </div>
        <button class="agent-close-btn" onclick="toggleMobilePreview()" style="margin-left:8px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div id="mobile-frame-wrapper" class="mobile-frame-wrapper">
        <div id="mobile-device-frame" class="mobile-device-frame">
          <div class="mobile-side-btns-left">
            <div class="mobile-side-btn"></div>
            <div class="mobile-side-btn"></div>
            <div class="mobile-side-btn"></div>
          </div>
          <div class="mobile-side-btns-right">
            <div class="mobile-side-btn"></div>
          </div>
          <div id="mobile-screen-wrap" class="mobile-screen-wrap">
            <div id="mobile-notch" class="mobile-notch"></div>
            <iframe id="mobile-preview-iframe" src="index.html?preview=1" class="mobile-preview-iframe" title="Mobile preview"></iframe>
            <div id="mobile-home-bar" class="mobile-home-bar"></div>
            <div id="mobile-home-btn" class="mobile-home-btn" style="display:none"></div>
          </div>
        </div>
      </div>

      <div class="mobile-preview-footer">
        <span id="mobile-device-label">iPhone 14 &mdash; 390&times;844</span>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../data/historic-data.js"></script>
  <script src="../data/users-data.js"></script>
  <script src="app.js"></script>
  <script>
    if (new URLSearchParams(location.search).get('preview') === '1') {
      document.getElementById('mobile-preview-trigger')?.remove();
      document.getElementById('mobile-preview-overlay')?.remove();
    }
  </script>
</body>
</html>
