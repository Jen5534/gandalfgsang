<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perch Admin</title>
  <link rel="icon" type="image/png" href="perchlogo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>

  <div id="admin-login" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <img src="perchlogo.png" width="120" height="120" alt="Perch">
        Perch Admin
      </div>
      <p class="login-subtitle">Facilities &amp; Admin Portal</p>
      <div style="margin-top:24px">
        <label class="field-label">Admin PIN</label>
        <input type="password" id="pin-input" class="field-input" placeholder="Enter PIN" maxlength="6"
          onkeydown="if(event.key==='Enter')doAdminLogin()">
        <div id="pin-error" style="color:var(--danger);font-size:12px;margin-top:6px;display:none">Incorrect PIN. Try <strong>1234</strong>.</div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="doAdminLogin()">Sign In</button>
      <div style="margin-top:20px;text-align:center">
        <a href="index.html" style="font-size:12px;color:var(--text-muted);text-decoration:none">&larr; Back to main app</a>
      </div>
    </div>
  </div>

  <div id="admin-app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="22" height="22" viewBox="0 0 200 200" fill="none"><rect width="200" height="200" rx="42" fill="rgba(255,255,255,0.15)"/><path d="M10 155 Q100 149 190 153" stroke="white" stroke-width="13" stroke-linecap="round"/><path d="M60 100 L18 77 L30 108 L12 148 L62 126 Z" fill="white"/><circle cx="90" cy="110" r="36" fill="white"/><circle cx="132" cy="82" r="25" fill="white"/><path d="M155 81 L184 68 L184 92 Z" fill="white"/><circle cx="141" cy="77" r="8" fill="rgba(0,0,0,0.25)"/><circle cx="138" cy="74" r="3" fill="white"/></svg>
        <span>Perch Admin</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Reports</div>
        <a href="#" class="nav-item" data-view="overview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Overview
        </a>
        <a href="#" class="nav-item" data-view="occupancy">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Occupancy
        </a>
        <a href="#" class="nav-item" data-view="noshows">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          No-shows
        </a>
        <a href="#" class="nav-item" data-view="deskreport">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 4v16M2 12h20"/></svg>
          Desk Usage
        </a>
        <a href="#" class="nav-item" data-view="teamreport">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Teams
        </a>
        <a href="#" class="nav-item" data-view="neighbourhoods">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
          Neighbourhoods
        </a>
        <a href="#" class="nav-item" data-view="feedback">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Feedback
        </a>
        <a href="#" class="nav-item" data-view="aianalysis">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="1" fill="currentColor"/><path d="M9.5 3.5C7 5 5 7.5 5 10.5"/><path d="M14.5 3.5C17 5 19 7.5 19 10.5"/></svg>
          AI Analysis
        </a>
        <div class="nav-section-label" style="margin-top:12px">Settings</div>
        <a href="#" class="nav-item" data-view="rules">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Booking Rules
        </a>
        <a href="#" class="nav-item" data-view="deskconfig">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          Desk Config
        </a>
        <a href="#" class="nav-item" data-view="officesettings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          Office &amp; Location
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-btns">
          <a href="index.html" class="btn-switch">Back to app</a>
          <button class="btn-signout" onclick="adminLogout()">Sign out</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div id="view-overview"     class="view"></div>
      <div id="view-occupancy"    class="view hidden"></div>
      <div id="view-noshows"      class="view hidden"></div>
      <div id="view-deskreport"   class="view hidden"></div>
      <div id="view-teamreport"   class="view hidden"></div>
      <div id="view-neighbourhoods" class="view hidden"></div>
      <div id="view-feedback"     class="view hidden"></div>
      <div id="view-aianalysis"   class="view hidden"></div>
      <div id="view-rules"        class="view hidden"></div>
      <div id="view-deskconfig"   class="view hidden"></div>
      <div id="view-officesettings" class="view hidden"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="users-data-var.js"></script>
  <script src="dummy-bookings-var.js"></script>
  <script src="admin.js"></script>
</body>
</html>
